<!doctype html>
<html lang="en">
  <head>
    <style>
      * {
        border: 0;
        margin: 0;
        box-sizing: border-box;
      }
      div {
        border: 4px solid orange;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      p {
        margin: 10px;
        border: 4px solid black;
      }
      .red {
        background-color: red;
      }
      .blue {
        background-color: cornflowerblue;
      }
      .green {
        background-color: green;
      }
    </style>
  </head>
  <body>
    <div>
      <p class="red">1</p>
      <p class="blue">2</p>
      <p class="green">3</p>
    </div>
  </body>
</html>
