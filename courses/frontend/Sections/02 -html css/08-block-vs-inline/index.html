<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Display Demo</title>
    <style>
      
      * {
        margin: 0;
        padding: 0;
      }

      body {
        border: 20px solid green;
      }

      p {
        font-family: sans-serif;
        font-size: 48px;
        display: inline-block;
        width: 250px;
        height: 250px;
      }
    </style>
  </head>
  <body>
      <p style="background-color: red;">Box 1</p>
      <p style="background-color: blue;">Box 2</p>
      <p style="background-color: orange;">Box 3</p>
    </div>
  </body>
</html>

<!--

display: block
  - starts on a new line (hence elements stacked vertically)
  - width and height are applied

display: inline
  - stays on the same line as other elements (hence elements stacked horizontally)
  - width and height are ignored
  - element size is based only on its content

display: inline-block
  - stays on the same line as other elements (hence elements stacked horizontally)
  - element width and height are applied
  - behaves like inline (horizontal) + block (sizing)
  



-->
